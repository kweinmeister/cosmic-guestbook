steps:
  # Step 1: Install, Lint, and Test Backend
  - name: 'node:20'
    id: 'backend-test'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run lint && npm run test'
    dir: 'backend'

  # Step 2: Install, Lint, and Test Frontend
  - name: 'node:20'
    id: 'frontend-test'
    waitFor: ['-']
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run lint && npm run test'
    dir: 'frontend'

  # Step 3: Deploy to Cloud Run from source using Google Cloud Buildpacks
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: gcloud
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - 'cosmic-guestbook'
  #     - '--source'
  #     - '.'
  #     - '--region'
  #     - 'us-central1'
  #     - '--allow-unauthenticated'
  #     - '--project'
  #     - '$PROJECT_ID'

options:
  logging: CLOUD_LOGGING_ONLY