steps:
  # Step 1: Install, Lint, and Test Backend
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'backend'
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'backend'
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']
    dir: 'backend'

  # Step 2: Install, Lint, and Test Frontend
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'frontend'
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'frontend'
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']
    dir: 'frontend'

  # Step 3: Deploy to Cloud Run from source using Google Cloud Buildpacks
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: gcloud
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - 'cosmic-guestbook'
  #     - '--source'
  #     - '.'
  #     - '--region'
  #     - 'us-central1'
  #     - '--allow-unauthenticated'
  #     - '--project'
  #     - 'vertical-datum-418119'

options:
  logging: CLOUD_LOGGING_ONLY