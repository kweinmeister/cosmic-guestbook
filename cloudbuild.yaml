steps:
  # Step 1: Install, Lint, and Test Backend
  - name: 'node:20'
    id: 'backend-test'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run lint && npm run test'
    dir: 'backend'

  # Step 2: Install, Lint, and Test Frontend
  - name: 'node:20'
    id: 'frontend-test'
    waitFor: ['-']
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run lint && npm run test'
    dir: 'frontend'

  # Step 3: Deploy to Cloud Run via Cloud Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud deploy apply --file=clouddeploy.yaml --region=us-central1
        gcloud deploy releases create release-$$BUILD_ID --delivery-pipeline=cosmic-guestbook-pipeline --region=us-central1 --deploy-parameters="REPOSITORY_SLUG=$$REPO_FULL_NAME" --source=.

options:
  logging: CLOUD_LOGGING_ONLY